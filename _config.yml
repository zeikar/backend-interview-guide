title: 백엔드 개발자 면접 가이드
description: 대규모 트래픽을 처리하는 백엔드 개발자 면접 주제를 데이터베이스, 클라우드, 시스템 디자인, 프로그래밍 카테고리로 정리한 문서 사이트입니다.
remote_theme: just-the-docs/just-the-docs@v0.10.1
url: https://zeikar.github.io
baseurl: /backend-interview-guide
lang: ko
permalink: pretty

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

nav_enabled: true
nav_sort: case_insensitive
heading_anchors: true
back_to_top: true
back_to_top_text: 맨 위로
color_scheme: light

aux_links:
  GitHub Repository:
    - https://github.com/zeikar/backend-interview-guide
aux_links_new_tab: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - .claude/
  - .codex/
  - _workspace/
  - vendor/
  - node_modules/
