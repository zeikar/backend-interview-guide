title: 백엔드 개발자 면접 가이드
description: 데이터베이스, 클라우드, 시스템 디자인, 프로그래밍을 중심으로 백엔드 면접에서 자주 나오는 주제를 정리한 한국어 가이드입니다.
remote_theme: just-the-docs/just-the-docs@v0.10.1
url: https://zeikar.github.io
baseurl: /backend-interview-guide
lang: ko
permalink: pretty

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

nav_enabled: true
nav_sort: case_insensitive
heading_anchors: true
back_to_top: true
back_to_top_text: 맨 위로
color_scheme: guide

aux_links:
  GitHub Repository:
    - https://github.com/zeikar/backend-interview-guide
aux_links_new_tab: true

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - AGENTS.md
  - .claude/
  - .codex/
  - _workspace/
  - vendor/
  - node_modules/
