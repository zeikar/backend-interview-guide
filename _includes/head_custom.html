<meta property="og:locale" content="ko_KR">
<meta property="og:image" content="https://dogimg.vercel.app/api/og?url={{ page.url | absolute_url | url_encode }}" />
<meta name="theme-color" content="#0f4c81">
<script>
  window.GUIDE_SEARCH_DATA_URL = "{{ '/search-data.json' | relative_url }}";
</script>
<script defer src="{{ '/assets/js/hangul-keyboard-utils.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/search-utils.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/search.js' | relative_url }}"></script>

{% if page.url == "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title | escape }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "inLanguage": "ko-KR",
  "description": "{{ page.description | default: site.description | strip_html | strip_newlines | escape }}",
  "about": [
    "백엔드 면접 질문",
    "백엔드 개발자 면접 질문",
    "시스템 디자인 면접 질문",
    "데이터베이스 면접 질문"
  ]
}
</script>
{% endif %}
