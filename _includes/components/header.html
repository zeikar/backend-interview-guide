{% capture search_placeholder %}{% include search_placeholder_custom.html %}{% endcapture %}

<div id="main-header" class="main-header">
  <div class="search" role="search">
    <div class="search-input-wrap">
      <input
        type="text"
        id="search-input"
        class="search-input"
        tabindex="0"
        placeholder="{{ search_placeholder | strip_html | strip }}"
        aria-label="{{ search_placeholder | strip_html | strip }}"
        autocomplete="off"
        spellcheck="false"
      >
      <label for="search-input" class="search-label" aria-hidden="true">
        <svg viewBox="0 0 24 24" class="search-icon">
          <path
            fill="currentColor"
            d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16a6.47 6.47 0 0 0 4.23-1.57l.27.28v.79L20 21.5 21.5 20zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"
          />
        </svg>
      </label>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
  {% if site.aux_links %}
    {% include components/aux_nav.html %}
  {% endif %}
</div>
